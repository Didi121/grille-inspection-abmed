<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ABMed — Inspections</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════ VARIABLES ═══════════════════ */
:root {
  /* Monochrome - Style Kenya Hara */
  --white: #FFFFFF;
  --black: #000000;
  --gray-50: #FAFAFA;
  --gray-100: #F5F5F5;
  --gray-200: #E5E5E5;
  --gray-300: #D4D4D4;
  --gray-700: #404040;
  --gray-900: #171717;

  /* Accent unique */
  --accent: #DC2626;
  --accent-light: #FEE2E2;

  /* Sémantique */
  --bg: var(--white);
  --surface: var(--gray-50);
  --border: var(--gray-200);
  --text: var(--gray-900);
  --text-muted: var(--gray-700);

  /* Espacements (Ma 間) */
  --space-xs: 8px;
  --space-s: 16px;
  --space-m: 32px;
  --space-l: 64px;
  --space-xl: 96px;

  /* Typographie */
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;

  /* Pas de border-radius */
  --radius: 0;
}

/* ═══════════════════ RESET ═══════════════════ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.75;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
}

h1 {
  font-size: 32px;
  font-weight: 400;
  line-height: 1.25;
}

h2 {
  font-size: 24px;
  font-weight: 400;
  line-height: 1.25;
}

h3 {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.25;
}

h4 {
  font-size: 16px;
  font-weight: 500;
}

small {
  font-size: 14px;
}

/* ═══════════════════ LAYOUT ═══════════════════ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.screen {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.screen.visible {
  display: flex;
  flex-direction: column;
}

/* ═══════════════════ TOPBAR ═══════════════════ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-m) var(--space-l);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-shrink: 0;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: var(--space-s);
  cursor: pointer;
}

.topbar-logo {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  font-size: 14px;
  color: var(--white);
  background: var(--black);
}

.topbar-title {
  font-weight: 500;
  font-size: 16px;
}

.topbar-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.topbar-nav {
  display: flex;
  gap: 8px;
  background: var(--surface);
  padding: 0;
}

.nav-btn {
  padding: var(--space-s) var(--space-m);
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 14px;
  cursor: pointer;
}

.nav-btn:hover {
  color: var(--text);
}

.nav-btn.active {
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: var(--space-m);
}

.user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px var(--space-s);
  background: var(--gray-100);
  border: 1px solid var(--border);
  font-size: 14px;
}

.user-pill .role {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

/* ═══════════════════ BUTTONS ═══════════════════ */
.btn-primary {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: var(--white);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}

.btn-primary:hover {
  background: var(--white);
  color: var(--accent);
}

.btn-sm {
  padding: 8px var(--space-s);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  cursor: pointer;
}

.btn-sm:hover {
  background: var(--gray-100);
  color: var(--text);
}

.btn-icon {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.btn-icon:hover {
  background: var(--gray-100);
  color: var(--text);
}

/* ═══════════════════ PROGRESS ═══════════════════ */
.progress-strip {
  display: flex;
  align-items: center;
  gap: var(--space-m);
  padding: var(--space-s) var(--space-l);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.progress-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  white-space: nowrap;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
}

.progress-count {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
}

/* ═══════════════════ LOGIN ═══════════════════ */
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: var(--space-l);
}

.login-card {
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: var(--space-l);
}

.login-card h2 {
  text-align: center;
  margin-bottom: 8px;
}

.login-card .sub {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: var(--space-l);
}

.login-card .err {
  font-size: 14px;
  color: var(--accent);
  text-align: center;
  margin-bottom: var(--space-s);
  min-height: 18px;
}

/* ═══════════════════ FORMS ═══════════════════ */
.field {
  margin-bottom: var(--space-m);
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* ═══════════════════ DASHBOARD ═══════════════════ */
.dash {
  max-width: 960px;
  margin: 0 auto;
  padding: var(--space-l) var(--space-xl);
  width: 100%;
}

.dash-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-l);
}

.dash-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: var(--space-l);
}

.dash-tab {
  padding: 8px var(--space-s);
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 14px;
  cursor: pointer;
}

.dash-tab:hover {
  color: var(--text);
}

.dash-tab.active {
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
}

.insp-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-m);
}

.insp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: var(--space-m);
  cursor: pointer;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: var(--space-m);
}

.insp-card:hover {
  border-color: var(--text);
}

.insp-icon {
  font-size: 24px;
}

.insp-info h3 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 4px;
}

.insp-info p {
  font-size: 14px;
  color: var(--text-muted);
  margin: 0;
}

.insp-progress {
  text-align: right;
}

.insp-progress .pct {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
}

.insp-progress .lbl {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.status-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--gray-100);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.status-draft {
  background: var(--gray-100);
}

.status-in_progress {
  background: var(--gray-100);
}

.status-completed {
  background: var(--gray-100);
}

.status-validated {
  background: var(--accent-light);
  color: var(--accent);
  border-color: var(--accent);
}

.status-archived {
  background: var(--gray-100);
}

.empty-state {
  text-align: center;
  padding: var(--space-xl) var(--space-l);
  color: var(--text-muted);
}

.empty-state .icon {
  font-size: 48px;
  margin-bottom: var(--space-m);
  display: block;
}

.empty-state p {
  font-size: 16px;
}

/* ═══════════════════ GRID SELECTOR ═══════════════════ */
.gs {
  max-width: 960px;
  margin: 0 auto;
  padding: var(--space-l) var(--space-xl);
  width: 100%;
}

.gs h1 {
  text-align: center;
}

.gs .sub {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin: 8px 0 var(--space-l);
}

.grid-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--space-m);
}

.grid-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: var(--space-l);
  cursor: pointer;
  position: relative;
}

.grid-card:hover {
  border-color: var(--text);
}

.grid-card .icon {
  font-size: 32px;
  margin-bottom: var(--space-s);
  display: block;
}

.grid-card .name {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 4px;
}

.grid-card .code {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: var(--space-s);
}

.grid-card .desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: var(--space-m);
}

.grid-card .stats {
  display: flex;
  gap: var(--space-m);
}

.grid-card .stat {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.grid-card .stat strong {
  color: var(--text);
  font-size: 16px;
}

/* ═══════════════════ META FORM ═══════════════════ */
.meta-form {
  max-width: 560px;
  margin: var(--space-l) auto;
  padding: 0 var(--space-l);
  width: 100%;
}

.meta-back {
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  margin-bottom: var(--space-m);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.meta-back:hover {
  color: var(--text);
}

.meta-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--gray-100);
  border: 1px solid var(--border);
  font-size: 12px;
  margin-bottom: var(--space-s);
}

.meta-title {
  margin-bottom: 8px;
}

.meta-sub {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: var(--space-l);
}

/* ═══════════════════ SIDEBAR ═══════════════════ */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 0;
}

.sidebar::-webkit-scrollbar {
  width: 6px;
}

.sidebar::-webkit-scrollbar-thumb {
  background: var(--border);
}

.section-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
}

.section-item:hover {
  background: var(--gray-100);
}

.section-item.active {
  border-left-color: var(--accent);
  background: var(--accent-light);
}

.si-num {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  flex-shrink: 0;
  background: var(--gray-100);
}

.section-item.active .si-num {
  background: var(--accent);
  color: var(--white);
}

.si-info {
  flex: 1;
  min-width: 0;
}

.si-name {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.si-prog {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.si-badge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 2px 6px;
  background: var(--gray-100);
  color: var(--text-muted);
}

.si-badge.done {
  color: var(--accent);
}

/* ═══════════════════ CAROUSEL ═══════════════════ */
.carousel {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: var(--space-l);
  overflow-y: auto;
}

.c-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.c-badge {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  padding: 4px 8px;
  background: var(--gray-100);
  color: var(--text-muted);
}

.c-section {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

.criterion-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: var(--space-l);
  margin-top: 8px;
}

.c-ref {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: var(--space-s);
  padding: 6px 8px;
  background: var(--gray-100);
  display: inline-block;
}

.c-text {
  font-size: 16px;
  line-height: 1.75;
  margin-bottom: var(--space-l);
}

.resp-row {
  display: flex;
  gap: var(--space-s);
  margin-bottom: var(--space-m);
}

.resp-btn {
  flex: 1;
  padding: 12px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.resp-btn:hover {
  border-color: var(--text);
}

.resp-btn.oui.sel {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}

.resp-btn.non.sel {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}

.obs-lbl {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.obs-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  resize: vertical;
  min-height: 60px;
}

.obs-input:focus {
  outline: none;
  border-color: var(--accent);
}

.obs-input::placeholder {
  color: var(--text-muted);
}

.c-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: var(--space-l);
  padding-top: var(--space-s);
  border-top: 1px solid var(--border);
}

.nav-arr {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px var(--space-s);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}

.nav-arr:hover {
  background: var(--gray-100);
}

.nav-arr:disabled {
  opacity: 0.3;
  cursor: default;
}

.nav-arr.primary {
  background: var(--accent);
  color: var(--white);
  border-color: var(--accent);
}

.nav-arr.primary:hover {
  background: var(--text);
  color: var(--white);
}

.nav-cnt {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-muted);
}

/* ═══════════════════ REPORT ═══════════════════ */
.report {
  max-width: 780px;
  margin: 0 auto;
  padding: var(--space-l) var(--space-xl);
  width: 100%;
  overflow-y: auto;
  flex: 1;
}

.report h2 {
  text-align: center;
}

.report .sub {
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  margin: 8px 0 var(--space-l);
}

.stats-g {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-s);
  margin-bottom: var(--space-l);
}

.stat-c {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: var(--space-m);
  text-align: center;
}

.stat-v {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
}

.stat-l {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  font-weight: 500;
}

.conf-bar {
  height: 6px;
  background: var(--border);
  overflow: hidden;
  margin-bottom: var(--space-l);
}

.conf-fill {
  height: 100%;
  background: var(--accent);
}

.ec-title {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: var(--space-m);
  display: flex;
  align-items: center;
  gap: 12px;
}

.ec-count {
  font-family: var(--mono);
  font-size: 12px;
  padding: 4px 8px;
  background: var(--accent-light);
  color: var(--accent);
}

.ecart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  padding: var(--space-m);
  margin-bottom: var(--space-s);
}

.ecart-card .sec {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.ecart-card .desc {
  font-size: 14px;
  margin-top: 6px;
  line-height: 1.6;
}

.ecart-card .ref {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
}

.ecart-card .obs {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--gray-100);
  font-size: 14px;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.6;
}

.rpt-actions {
  display: flex;
  gap: var(--space-s);
  justify-content: center;
  padding: var(--space-s) 0 var(--space-l);
  border-top: 1px solid var(--border);
  margin-top: var(--space-m);
  flex-wrap: wrap;
}

.btn-rpt {
  padding: 8px var(--space-s);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}

.btn-rpt:hover {
  background: var(--gray-100);
}

.btn-rpt.primary {
  background: var(--accent);
  color: var(--white);
  border-color: var(--accent);
}

.btn-rpt.primary:hover {
  background: var(--text);
}

/* ═══════════════════ ADMIN PANELS ═══════════════════ */
.panel {
  max-width: 960px;
  margin: 0 auto;
  padding: var(--space-l) var(--space-xl);
  width: 100%;
}

.panel h2 {
  margin-bottom: var(--space-l);
  display: flex;
  align-items: center;
  gap: 12px;
}

.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.tbl th {
  text-align: left;
  padding: 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.tbl td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.tbl tr:hover td {
  background: var(--gray-50);
}

.tbl .mono {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
}

.role-tag {
  font-size: 11px;
  padding: 4px 8px;
  font-weight: 500;
  text-transform: uppercase;
  background: var(--gray-100);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.role-admin {
  background: var(--accent-light);
  color: var(--accent);
  border-color: var(--accent);
}

.role-lead_inspector {
  background: var(--gray-100);
  color: var(--text-muted);
}

.role-inspector {
  background: var(--gray-100);
  color: var(--text-muted);
}

.role-viewer {
  background: var(--gray-100);
  color: var(--text-muted);
}

.active-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.active-dot.on {
  background: var(--accent);
}

.active-dot.off {
  background: var(--text-muted);
}

.action-tag {
  font-size: 11px;
  padding: 4px 8px;
  font-weight: 500;
  font-family: var(--mono);
  background: var(--gray-100);
  color: var(--text-muted);
}

/* ═══════════════════ MODAL ═══════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  display: none;
}

.modal-overlay.visible {
  display: flex;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: var(--space-l);
  width: 420px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
}

.modal h3 {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: var(--space-m);
}

.modal-actions {
  display: flex;
  gap: var(--space-s);
  justify-content: flex-end;
  margin-top: var(--space-m);
}

/* ═══════════════════ RESPONSIVE ═══════════════════ */
@media (max-width: 768px) {
  .sidebar {
    display: none;
  }

  .carousel {
    padding: var(--space-m);
  }

  .stats-g {
    grid-template-columns: repeat(2, 1fr);
  }

  .grid-cards {
    grid-template-columns: 1fr;
  }

  .insp-card {
    grid-template-columns: auto 1fr auto;
  }

  .dash {
    padding: var(--space-m);
  }

  .report {
    padding: var(--space-m);
  }

  .topbar {
    padding: var(--space-s) var(--space-m);
  }
}
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand" onclick="goToDashboard()">
      <div class="topbar-logo" id="tLogo">ABM</div>
      <div>
        <div class="topbar-title" id="tTitle">ABMed Inspections</div>
        <div class="topbar-sub" id="tSub">Connexion</div>
      </div>
    </div>
    <div class="topbar-nav" id="tNav" style="display:none"></div>
    <div class="topbar-right" id="tRight" style="display:none">
      <div class="user-pill"><span id="tUser">—</span><span class="role" id="tRole">—</span></div>
      <button class="btn-sm" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="progress-strip" id="pStrip" style="display:none">
    <span class="progress-label">Progression</span>
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <span class="progress-count" id="pCount">0/0</span>
  </div>

  <!-- LOGIN -->
  <div class="screen visible" id="s-login">
    <div class="login-wrap">
      <div class="login-card">
        <h2>Connexion</h2>
        <p class="sub">Inspections pharmaceutiques ABMed</p>
        <div class="err" id="loginErr"></div>
        <div class="field"><label>Nom d'utilisateur</label><input id="loginUser" placeholder="admin"/></div>
        <div class="field"><label>Mot de passe</label><input id="loginPass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <button class="btn-primary" onclick="doLogin()">Se connecter</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="screen" id="s-dash">
    <div class="dash">
      <div class="dash-header">
        <h1>Mes inspections</h1>
        <button class="btn-primary" style="width:auto;padding:8px 16px;font-size:14px" onclick="showScreen('grid-select')">+ Nouvelle inspection</button>
      </div>
      <div class="dash-tabs" id="dashTabs"></div>
      <div class="insp-list" id="inspList"></div>
    </div>
  </div>

  <!-- GRID SELECTOR -->
  <div class="screen" id="s-grid-select">
    <div class="gs">
      <h1>Choisir une grille</h1>
      <p class="sub">Sélectionnez le type d'établissement à inspecter</p>
      <div class="grid-cards" id="gridCards"></div>
    </div>
  </div>

  <!-- META -->
  <div class="screen" id="s-meta">
    <div class="meta-form">
      <div class="meta-back" onclick="showScreen('grid-select')">← Changer de grille</div>
      <div class="meta-badge" id="metaBadge"></div>
      <h1 class="meta-title">Nouvelle inspection</h1>
      <p class="meta-sub">Informations générales</p>
      <div class="field"><label>Date</label><input type="date" id="mDate"/></div>
      <div class="field"><label>Établissement</label><input id="mEstab" placeholder="Ex: Pharmacie du Carrefour"/></div>
      <div class="field"><label>Type d'inspection</label><select id="mType"><option>Routine</option><option>Enquête</option><option>Plaintes/réclamations</option><option>À la demande</option><option>Pré-ouverture</option><option>Visite de conformité</option><option>Autre</option></select></div>
      <div class="field"><label>Inspecteurs (séparés par virgule)</label><input id="mInsp" placeholder="Dr. Konou, Dr. Ahouansou"/></div>
      <button class="btn-primary" id="btnStart" onclick="createAndStart()">Démarrer l'inspection →</button>
    </div>
  </div>

  <!-- INSPECTION -->
  <div class="screen" id="s-inspection"><div class="main"><div class="sidebar" id="secList"></div><div class="carousel" id="carArea"></div></div></div>

  <!-- REPORT -->
  <div class="screen" id="s-report"><div class="report" id="rptContent"></div></div>

  <!-- USERS -->
  <div class="screen" id="s-users"><div class="panel" id="usersPanel"></div></div>

  <!-- AUDIT -->
  <div class="screen" id="s-audit"><div class="panel" id="auditPanel"></div></div>

  <!-- GRILLES ADMIN -->
  <div class="screen" id="s-grids"><div class="panel" id="gridsPanel"></div></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ═══════════════════ CORE STATE ═══════════════════
let session = null;
let gridsData = [];
let activeGrid = null;
let sections = [], allCriteria = [], responses = {};
let currentIndex = 0, currentInspectionId = null;
const isTauri = !!(window.__TAURI_INTERNALS__);

// ═══════════════════ INVOKE / FALLBACK DB ═══════════════════
async function invoke(cmd, args={}) {
  if (isTauri) return await window.__TAURI_INTERNALS__.invoke(cmd, args);
  return fallback(cmd, args);
}

const DB = { users: [], inspections: [], responses: {}, audit: [], sessions: {}, grids: [], gridVersions: [] };
function saveDB() { try { localStorage.setItem('abmed_db', JSON.stringify({users:DB.users,inspections:DB.inspections,responses:DB.responses,audit:DB.audit,grids:DB.grids,gridVersions:DB.gridVersions})); } catch(e){} }
function loadDB() { try { const d=JSON.parse(localStorage.getItem('abmed_db')||'null'); if(d){ DB.users=d.users||[]; DB.inspections=d.inspections||[]; DB.responses=d.responses||{}; DB.audit=d.audit||[]; DB.grids=d.grids||[]; DB.gridVersions=d.gridVersions||[]; }} catch(e){} }
function initFallbackDB() {
  loadDB();
  if (!DB.users.length) {
    DB.users.push({ id:crypto.randomUUID(), username:'admin', full_name:'Administrateur', role:'admin', active:true,
      password:'admin123', created_at: now(), updated_at: now() });
    DB.users.push({ id: crypto.randomUUID(), username:'inspecteur1', full_name:'Dr. Konou',
      role:'inspector', active:true, password:'pass123', created_at: now(), updated_at: now() });
  }
  if (!DB.grids.length) {
    DB.grids = buildAllGridsJS().map(g=>({...g, status:'active', is_current:true, created_at:now()}));
  }
  saveDB();
}
function now() { return new Date().toISOString().replace('T',' ').substring(0,19); }
function addAudit(userId, username, action, entityType, entityId, details) {
  DB.audit.unshift({ id: DB.audit.length+1, timestamp: now(), user_id: userId, username, action, entity_type: entityType, entity_id: entityId, details });
  saveDB();
}

function fallback(cmd, a) {
  initFallbackDB();
  switch(cmd) {
    case 'list_grids': return DB.grids.filter(g=>g.status==='active').map(g=>({...g, criteria_count:g.sections.reduce((s,sec)=>s+sec.items.length,0), section_count:g.sections.length}));
    case 'cmd_login': {
      const u = DB.users.find(x=>x.username===a.username&&x.password===a.password&&x.active);
      if(!u) throw 'Identifiants incorrects';
      const tok = crypto.randomUUID();
      DB.sessions[tok] = u.id;
      addAudit(u.id, u.username, 'LOGIN', 'session', tok, '');
      return { token:tok, user:{id:u.id,username:u.username,full_name:u.full_name,role:u.role,active:u.active,created_at:u.created_at,updated_at:u.updated_at}};
    }
    case 'cmd_logout': { const uid=DB.sessions[a.token]; const u=DB.users.find(x=>x.id===uid); addAudit(uid,u?.username,'LOGOUT','session',a.token,''); delete DB.sessions[a.token]; return null; }
    case 'cmd_validate_session': {
      const uid = DB.sessions[a.token]; if(!uid) throw 'Session invalide';
      const u = DB.users.find(x=>x.id===uid); if(!u||!u.active) throw 'Session invalide';
      return {id:u.id,username:u.username,full_name:u.full_name,role:u.role,active:u.active,created_at:u.created_at,updated_at:u.updated_at};
    }
    case 'cmd_list_users': return DB.users.map(u=>({id:u.id,username:u.username,full_name:u.full_name,role:u.role,active:u.active,created_at:u.created_at,updated_at:u.updated_at}));
    case 'cmd_create_user': {
      const nu = {id:crypto.randomUUID(), username:a.req.username, full_name:a.req.full_name, role:a.req.role, password:a.req.password, active:true, created_at:now(), updated_at:now()};
      DB.users.push(nu); addAudit(null,null,'CREATE_USER','user',nu.id,nu.username);
      return {id:nu.id,username:nu.username,full_name:nu.full_name,role:nu.role,active:true,created_at:nu.created_at,updated_at:nu.updated_at};
    }
    case 'cmd_update_user': {
      const u = DB.users.find(x=>x.id===a.userId);
      if(u){ if(a.req.full_name)u.full_name=a.req.full_name; if(a.req.role)u.role=a.req.role; if(a.req.active!==undefined)u.active=a.req.active; u.updated_at=now(); }
      addAudit(session?.user?.id,session?.user?.username,'UPDATE_USER','user',a.userId,u?.username); saveDB(); return null;
    }
    case 'cmd_change_password': { const u=DB.users.find(x=>x.id===a.userId); if(u)u.password=a.newPassword; addAudit(session?.user?.id,session?.user?.username,'CHANGE_PASSWORD','user',a.userId,''); saveDB(); return null; }
    case 'cmd_delete_user': { const u=DB.users.find(x=>x.id===a.userId); if(u){u.active=false;} addAudit(session?.user?.id,session?.user?.username,'DELETE_USER','user',a.userId,u?.username); saveDB(); return null; }
    case 'cmd_create_inspection': {
      const id=crypto.randomUUID();
      DB.inspections.push({id, grid_id:a.req.grid_id, status:'draft', date_inspection:a.req.date_inspection, establishment:a.req.establishment,
        inspection_type:a.req.inspection_type, inspectors:a.req.inspectors, created_by:session?.user?.id, created_by_name:session?.user?.full_name,
        validated_by:null,validated_by_name:null,validated_at:null, created_at:now(), updated_at:now(), progress:{total:0,answered:0,conforme:0,non_conforme:0}});
      DB.responses[id]={};
      addAudit(session?.user?.id, session?.user?.username, 'CREATE_INSPECTION','inspection',id, a.req.establishment);
      return id;
    }
    case 'cmd_list_inspections': return DB.inspections.filter(i=>{
      if(a.myOnly && i.created_by!==session?.user?.id) return false;
      if(a.status && i.status!==a.status) return false; return true;
    }).sort((a,b)=>b.updated_at.localeCompare(a.updated_at));
    case 'cmd_get_inspection': return DB.inspections.find(i=>i.id===a.inspectionId);
    case 'cmd_get_responses': {
      const r = DB.responses[a.inspectionId]||{};
      return Object.entries(r).map(([cid,v])=>({criterion_id:parseInt(cid), conforme:v.conforme, observation:v.observation||'', updated_by:v.updated_by, updated_at:v.updated_at||now()}));
    }
    case 'cmd_save_response': {
      if(!DB.responses[a.inspectionId]) DB.responses[a.inspectionId]={};
      DB.responses[a.inspectionId][a.criterionId]={conforme:a.conforme, observation:a.observation, updated_by:session?.user?.id, updated_at:now()};
      const insp=DB.inspections.find(i=>i.id===a.inspectionId);
      if(insp){insp.status=insp.status==='draft'?'in_progress':insp.status; insp.updated_at=now();
        const r=DB.responses[a.inspectionId]; const vals=Object.values(r);
        insp.progress={total:vals.length, answered:vals.filter(v=>v.conforme!==null).length, conforme:vals.filter(v=>v.conforme===true).length, non_conforme:vals.filter(v=>v.conforme===false).length};
      }
      saveDB(); return null;
    }
    case 'cmd_set_inspection_status': {
      const insp=DB.inspections.find(i=>i.id===a.inspectionId);
      if(insp){insp.status=a.status; insp.updated_at=now(); if(a.status==='validated'){insp.validated_by=session?.user?.id;insp.validated_by_name=session?.user?.full_name;insp.validated_at=now();}}
      addAudit(session?.user?.id, session?.user?.username, 'SET_STATUS_'+a.status.toUpperCase(),'inspection',a.inspectionId,'');
      return null;
    }
    case 'cmd_delete_inspection': { DB.inspections=DB.inspections.filter(i=>i.id!==a.inspectionId); delete DB.responses[a.inspectionId]; addAudit(session?.user?.id,session?.user?.username,'DELETE_INSPECTION','inspection',a.inspectionId,''); saveDB(); return null; }
    case 'cmd_query_audit': {
      let logs = [...DB.audit];
      if(a.filter.user_id) logs=logs.filter(l=>l.user_id===a.filter.user_id);
      if(a.filter.action) logs=logs.filter(l=>l.action===a.filter.action);
      if(a.filter.entity_type) logs=logs.filter(l=>l.entity_type===a.filter.entity_type);
      const limit=a.filter.limit||100, offset=a.filter.offset||0;
      return logs.slice(offset, offset+limit);
    }
    case 'cmd_count_audit': return DB.audit.length;
    case 'cmd_list_grids_admin': return DB.grids.filter(g=>g.status==='active').map(g=>({id:g.id,name:g.name,code:g.code,description:g.description,icon:g.icon,color:g.color,criteria_count:g.sections.reduce((s,sec)=>s+sec.items.length,0),section_count:g.sections.length}));
    case 'cmd_create_grid': {
      const g={id:a.req.id,name:a.req.name,code:a.req.code,version:'1',description:a.req.description,icon:a.req.icon,color:a.req.color,sections:[],status:'active',is_current:true,created_at:now()};
      DB.grids.push(g); addAudit(null,null,'CREATE_GRID','grid',g.id,g.name); saveDB(); return g.id;
    }
    case 'cmd_update_grid_meta': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      if(g){ if(a.name)g.name=a.name; if(a.description)g.description=a.description; if(a.icon)g.icon=a.icon; if(a.color)g.color=a.color; }
      addAudit(null,null,'UPDATE_GRID','grid',a.gridId,''); saveDB(); return null;
    }
    case 'cmd_archive_grid': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      if(g) g.status='archived';
      addAudit(null,null,'ARCHIVE_GRID','grid',a.gridId,''); saveDB(); return null;
    }
    case 'cmd_duplicate_grid': {
      const src=DB.grids.find(x=>x.id===a.gridId);
      if(!src) throw 'Grille introuvable';
      const dup=JSON.parse(JSON.stringify(src));
      dup.id=a.newId; dup.name=a.newName; dup.code=src.code+'-copie'; dup.version='1'; dup.created_at=now();
      DB.grids.push(dup); addAudit(null,null,'DUPLICATE_GRID','grid',a.newId,'depuis '+a.gridId); saveDB(); return a.newId;
    }
    case 'cmd_create_section': {
      const g=DB.grids.find(x=>x.id===a.req.grid_id||x.id===a.req.gridId);
      if(!g) throw 'Grille introuvable';
      const maxId=g.sections.reduce((m,s)=>Math.max(m,s.id),0);
      g.sections.push({id:maxId+1,title:a.req.title,items:[]});
      addAudit(null,null,'ADD_SECTION','grid',g.id,a.req.title); saveDB(); return maxId+1;
    }
    case 'cmd_update_section': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      if(g){ const s=g.sections.find(x=>x.id===a.sectionId); if(s)s.title=a.title; }
      saveDB(); return null;
    }
    case 'cmd_delete_section': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      if(g) g.sections=g.sections.filter(s=>s.id!==a.sectionId);
      addAudit(null,null,'DELETE_SECTION','grid',a.gridId,'section '+a.sectionId); saveDB(); return null;
    }
    case 'cmd_create_criterion': {
      const g=DB.grids.find(x=>x.id===a.req.grid_id||x.id===a.req.gridId);
      if(!g) throw 'Grille introuvable';
      const sec=g.sections.find(s=>s.id===a.req.section_id||s.id===a.req.sectionId);
      if(!sec) throw 'Section introuvable';
      const maxCid=g.sections.reduce((m,s)=>s.items.reduce((m2,c)=>Math.max(m2,c.id),m),0);
      sec.items.push({id:maxCid+1,reference:a.req.reference,description:a.req.description,pre_opening:a.req.pre_opening||false});
      addAudit(null,null,'ADD_CRITERION','grid',g.id,a.req.reference); saveDB(); return maxCid+1;
    }
    case 'cmd_update_criterion': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      if(g){ for(const s of g.sections){ const c=s.items.find(x=>x.id===a.criterionId); if(c){ if(a.reference)c.reference=a.reference; if(a.description)c.description=a.description; if(a.preOpening!==undefined)c.pre_opening=a.preOpening; break; }}}
      saveDB(); return null;
    }
    case 'cmd_delete_criterion': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      if(g){ for(const s of g.sections){ s.items=s.items.filter(c=>c.id!==a.criterionId); }}
      addAudit(null,null,'DELETE_CRITERION','grid',a.gridId,'criterion '+a.criterionId); saveDB(); return null;
    }
    case 'cmd_list_grid_versions': return DB.gridVersions.filter(v=>v.grid_id===a.gridId).map(v=>({version:v.version,change_summary:v.summary,created_at:v.created_at}));
    case 'cmd_create_grid_version': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      if(!g) throw 'Grille introuvable';
      const ver=String((DB.gridVersions.filter(v=>v.grid_id===a.gridId).length||0)+1);
      DB.gridVersions.push({grid_id:a.gridId,version:ver,summary:a.changeSummary||'',snapshot:JSON.stringify(g),created_at:now()});
      g.version=ver; saveDB(); return ver;
    }
    case 'cmd_export_grid_json': {
      const g=DB.grids.find(x=>x.id===a.gridId);
      return g?JSON.stringify(g,null,2):'{}';
    }
    case 'cmd_export_audit_csv': return 'timestamp,action,user,details\n'+DB.audit.map(l=>l.timestamp+','+l.action+','+(l.username||'')+','+(l.details||'')).join('\n');
    case 'cmd_export_audit_json': return JSON.stringify(DB.audit,null,2);
    case 'get_grid': {
      const g=DB.grids.find(x=>x.id===a.gridId&&x.status==='active');
      return g||buildAllGridsJS().find(x=>x.id===a.gridId)||null;
    }
    default: return null;
  }
}

// ═══════════════════ AUTH ═══════════════════
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u) { document.getElementById('loginErr').textContent = 'Saisissez un nom d\'utilisateur'; return; }
  try {
    session = await invoke('cmd_login',{username:u,password:p});
    document.getElementById('loginErr').textContent = '';
    afterLogin();
  } catch(e) {
    document.getElementById('loginErr').textContent = e.toString();
  }
}
async function doLogout() {
  if(session) try { await invoke('cmd_logout',{token:session.token}); } catch(_){}
  session = null; currentInspectionId=null;
  document.getElementById('tRight').style.display='none';
  document.getElementById('tNav').style.display='none';
  showScreen('login');
}
async function afterLogin() {
  document.getElementById('tRight').style.display='flex';
  document.getElementById('tUser').textContent=session.user.full_name;
  document.getElementById('tRole').textContent=roleLabel(session.user.role);
  gridsData = await invoke('list_grids');
  buildTopNav();
  showScreen('dash');
  loadDashboard();
}

let dashFilter = null;
async function loadDashboard() {
  const tabs = document.getElementById('dashTabs');
  tabs.innerHTML = ['Toutes','draft','in_progress','completed','validated'].map(s=>{
    const label = s==='Toutes'?'Toutes':({draft:'Brouillon',in_progress:'En cours',completed:'Terminées',validated:'Validées'}[s]);
    const val = s==='Toutes'?null:s;
    return `<button class="dash-tab ${dashFilter===val?'active':''}" onclick="dashFilter=${val===null?'null':"'"+val+"'"};loadDashboard()">${label}</button>`;
  }).join('');

  try {
    const list = await invoke('cmd_list_inspections',{token:session.token, myOnly:session.user.role==='inspector', status:dashFilter});
    const el = document.getElementById('inspList');
    if(!list.length) {
      el.innerHTML = `<div class="empty-state"><span class="icon">📋</span><p>Aucune inspection${dashFilter?' avec ce filtre':''}.<br>Cliquez sur "Nouvelle inspection" pour commencer.</p></div>`;
      return;
    }
    const gridMap = {}; gridsData.forEach(g=>gridMap[g.id]=g);
    el.innerHTML = list.map(i=>{
      const g = gridMap[i.grid_id]||{icon:'📋',name:i.grid_id,color:'var(--accent)'};
      const pct = i.progress.answered>0?Math.round((i.progress.conforme/i.progress.answered)*100):0;
      return `<div class="insp-card" onclick="openInspection('${i.id}')">
        <div class="insp-icon">${g.icon}</div>
        <div class="insp-info"><h3>${i.establishment||'Sans nom'}</h3><p>${g.name} · ${i.date_inspection||'—'} · ${i.created_by_name||'—'}</p></div>
        <div class="insp-progress"><div class="pct">${i.progress.answered}</div><div class="lbl">réponses</div></div>
        <span class="status-badge status-${i.status}">${statusLabel(i.status)}</span>
      </div>`;
    }).join('');
  } catch(e){ console.error(e); }
}
function statusLabel(s){ return {draft:'Brouillon',in_progress:'En cours',completed:'Terminée',validated:'Validée',archived:'Archivée'}[s]||s; }

// ═══════════════════ OPEN / RESUME INSPECTION ═══════════════════
async function openInspection(id) {
  try {
    const insp = await invoke('cmd_get_inspection',{token:session.token, inspectionId:id});
    const savedResps = await invoke('cmd_get_responses',{token:session.token, inspectionId:id});
    const grid = await invoke('get_grid',{gridId:insp.grid_id});
    if(!grid) { alert('Grille introuvable: '+insp.grid_id); return; }

    currentInspectionId = id;
    activeGrid = grid; sections = grid.sections;
    allCriteria = []; sections.forEach(s=>s.items.forEach(item=>allCriteria.push({...item, sectionTitle:s.title, sectionId:s.id})));
    responses = {};
    savedResps.forEach(r=>{ responses[r.criterion_id] = { conforme:r.conforme, observation:r.observation }; });
    currentIndex = 0;

    document.getElementById('tTitle').textContent=grid.name;
    document.getElementById('tSub').textContent=insp.establishment||grid.code;
    document.getElementById('tLogo').style.background='var(--accent)';
    showScreen('inspection');
    renderSidebar(); renderCriterion(); updateProgress();
  } catch(e){ alert('Erreur: '+e); }
}

// ═══════════════════ GRID SELECTOR ═══════════════════
async function renderGridSelector() {

}

async function selectGrid(gridId) {

// ═══════════════════ CREATE INSPECTION ═══════════════════
async function createAndStart() {
  const req = {
    grid_id: activeGrid.id,
    date_inspection: document.getElementById('mDate').value,
    establishment: document.getElementById('mEstab').value,
    inspection_type: document.getElementById('mType').value,
    inspectors: document.getElementById('mInsp').value.split(',').map(s=>s.trim()).filter(Boolean)
  };
  try {
    currentInspectionId = await invoke('cmd_create_inspection',{token:session.token, req});
    document.getElementById('tTitle').textContent=activeGrid.name;
    document.getElementById('tSub').textContent=req.establishment||activeGrid.code;
    document.getElementById('tLogo').style.background='var(--accent)';
    showScreen('inspection');
    renderSidebar(); renderCriterion(); updateProgress();
  } catch(e){ alert('Erreur: '+e); }
}

// ═══════════════════ SIDEBAR ═══════════════════
function renderSidebar() {
  const list=document.getElementById('secList'); list.innerHTML='';
  let idx=0;
  sections.forEach(s=>{
    const start=idx, total=s.items.length;
    const ans=s.items.filter(i=>responses[i.id]&&responses[i.id].conforme!==null&&responses[i.id].conforme!==undefined).length;
    const cur=currentIndex>=start&&currentIndex<start+total;
    const el=document.createElement('div'); el.className='section-item'+(cur?' active':'');
    el.innerHTML=`<div class="si-num">${s.id}</div>
      <div class="si-info"><div class="si-name">${s.title}</div><div class="si-prog">${ans}/${total}</div></div>
      <div class="si-badge ${ans===total?'done':''}">${ans===total?'✓':ans+'/'+total}</div>`;
    el.onclick=()=>{currentIndex=start;renderCriterion();renderSidebar()};
    list.appendChild(el); idx+=total;
  });
}

// ═══════════════════ CAROUSEL ═══════════════════
function renderCriterion() {
  const area=document.getElementById('carArea');
  if(!allCriteria.length||currentIndex<0||currentIndex>=allCriteria.length)return;
  const c=allCriteria[currentIndex];
  const r=responses[c.id]||{conforme:null,observation:''};
  area.innerHTML=`
    <div class="c-header">
      <span class="c-badge">${c.pre_opening?'► Pré-ouverture':'Critère '+c.id}</span>
      <span class="c-section">${c.sectionTitle}</span>
    </div>
    <div class="criterion-card">
      ${c.reference?`<div class="c-ref">${c.reference}</div>`:''}
      <div class="c-text">${c.description}</div>
      <div class="resp-row">
        <button class="resp-btn oui ${r.conforme===true?'sel':''}" onclick="setResp(${c.id},true)">✓ Conforme</button>
        <button class="resp-btn non ${r.conforme===false?'sel':''}" onclick="setResp(${c.id},false)">✕ Non conforme</button>
      </div>
      <div class="obs-lbl">Observations</div>
      <textarea class="obs-input" placeholder="Observation…" oninput="updateObs(${c.id},this.value)">${r.observation||''}</textarea>
    </div>
    <div class="c-nav">
      <button class="nav-arr" onclick="nav(-1)" ${currentIndex===0?'disabled':''}>← Précédent</button>
      <span class="nav-cnt">${currentIndex+1} / ${allCriteria.length}</span>
      ${currentIndex<allCriteria.length-1
        ?`<button class="nav-arr primary" onclick="nav(1)">Suivant →</button>`
        :`<button class="nav-arr primary" onclick="showScreen('report');renderReport()">Rapport →</button>`}
    </div>`;
}

// ═══════════════════ RESPONSES ═══════════════════
async function setResp(id,val) {
  if(!responses[id]) responses[id]={conforme:null,observation:''};
  responses[id].conforme=val;
  if(currentInspectionId && session) {
    try { await invoke('cmd_save_response',{token:session.token, inspectionId:currentInspectionId, criterionId:id, conforme:val, observation:responses[id].observation||''}); }
    catch(e){ console.error('Save error',e); }
  }
  renderCriterion(); updateProgress(); renderSidebar();
}
async function updateObs(id,text) {
  if(!responses[id]) responses[id]={conforme:null,observation:''};
  responses[id].observation=text;
  clearTimeout(updateObs._t);
  updateObs._t = setTimeout(async()=>{
    if(currentInspectionId && session) {
      try { await invoke('cmd_save_response',{token:session.token, inspectionId:currentInspectionId, criterionId:id, conforme:responses[id].conforme, observation:text}); }
      catch(e){ console.error(e); }
    }
  }, 600);
}
function nav(dir){currentIndex=Math.max(0,Math.min(allCriteria.length-1,currentIndex+dir));renderCriterion();renderSidebar()}
function updateProgress() {
  const total=allCriteria.length;
  const ans=Object.values(responses).filter(r=>r.conforme!==null&&r.conforme!==undefined).length;
  const pct=total>0?(ans/total)*100:0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pCount').textContent=`${ans} / ${total}`;
}

// ═══════════════════ REPORT ═══════════════════
async function renderReport() {
  const total=allCriteria.length;
  const ans=Object.values(responses).filter(r=>r.conforme!==null&&r.conforme!==undefined).length;
  const conf=Object.values(responses).filter(r=>r.conforme===true).length;
  const nonC=Object.values(responses).filter(r=>r.conforme===false).length;
  const rate=ans>0?((conf/ans)*100).toFixed(1):0;
  const ecarts=allCriteria.filter(c=>responses[c.id]?.conforme===false).map(c=>({...c,observation:responses[c.id]?.observation||''}));

  const isLeadOrAdmin = ['admin','lead_inspector'].includes(session?.user?.role);
  let insp = null;
  if(currentInspectionId) try { insp = await invoke('cmd_get_inspection',{token:session.token, inspectionId:currentInspectionId}); } catch(_){}
  const canValidate = isLeadOrAdmin && insp && insp.status !== 'validated';
  const canComplete = insp && insp.status === 'in_progress';

  document.getElementById('rptContent').innerHTML=`
    <h2>Rapport d'inspection</h2>
    <p class="sub">${activeGrid?.name||''} · ${insp?.establishment||'—'} · ${insp?.date_inspection||'—'}
    ${insp?` · <span class="status-badge status-${insp.status}">${statusLabel(insp.status)}</span>`:''}</p>
    <div class="stats-g">
      <div class="stat-c"><div class="stat-v">${total}</div><div class="stat-l">Total</div></div>
      <div class="stat-c"><div class="stat-v">${conf}</div><div class="stat-l">Conformes</div></div>
      <div class="stat-c"><div class="stat-v">${nonC}</div><div class="stat-l">Non conformes</div></div>
      <div class="stat-c"><div class="stat-v">${total-ans}</div><div class="stat-l">Non évalués</div></div>
    </div>
    <div style="text-align:center;margin-bottom:8px;font-size:14px;color:var(--text-muted)">Taux de conformité : <strong style="color:var(--accent)">${rate}%</strong></div>
    <div class="conf-bar"><div class="conf-fill" style="width:${rate}%"></div></div>
    ${ecarts.length?`<div class="ec-title">Écarts <span class="ec-count">${ecarts.length}</span></div>
      ${ecarts.map(e=>`<div class="ecart-card"><div class="sec">${e.sectionTitle}</div><div class="desc">${e.description}</div>
        ${e.reference?`<div class="ref">${e.reference}</div>`:''}${e.observation?`<div class="obs">"${e.observation}"</div>`:''}</div>`).join('')}`
      :'<p style="text-align:center;color:var(--accent);font-weight:500;padding:var(--space-m)">Aucun écart</p>'}
    <div class="rpt-actions">
      ${canComplete?`<button class="btn-rpt" onclick="setInspStatus('completed')">Marquer terminée</button>`:''}
      ${canValidate?`<button class="btn-rpt" style="background:var(--accent);color:var(--white)" onclick="setInspStatus('validated')">Valider</button>`:''}
      <button class="btn-rpt" onclick="exportJSON()">Export JSON</button>
      <button class="btn-rpt" onclick="goToDashboard()">Tableau de bord</button>
      <button class="btn-rpt primary" onclick="showScreen('inspection');renderCriterion();updateProgress()">Retour</button>
    </div>`;
}
async function setInspStatus(status) {
  if(!currentInspectionId) return;
  try {
    await invoke('cmd_set_inspection_status',{token:session.token, inspectionId:currentInspectionId, status});
    renderReport();
  } catch(e){ alert(e); }
}

      </div>`;

    // Afficher chaque section avec ses critères

      html += `
      <div style="border:1px solid var(--border);margin-bottom:var(--space-s)">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)">

            <th style="padding:6px 10px;text-align:left;width:25px">Pré</th>
            <th style="padding:6px 10px;text-align:left;width:140px">Référence</th>
            <th style="padding:6px 10px;text-align:left">Description</th>
            <th style="padding:6px 10px;text-align:right;width:110px">Actions</th>

            <td style="padding:5px 10px">${c.pre_opening?'<span style="color:var(--accent);font-weight:bold">►</span>':''}</td>
